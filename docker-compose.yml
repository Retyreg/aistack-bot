services:
  postgres:
    image: postgres:16-alpine
    container_name: aistack-bot-postgres
    environment:
      POSTGRES_USER: aistack
      POSTGRES_PASSWORD: aistack
      POSTGRES_DB: aistack
    ports:
      - "5433:5432"
    volumes:
      - aistack-bot-pg:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  aistack-bot-pg:
